name: Build and deploy ASP.Net Core app to Azure Web App - escola-de-cursos

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build with dotnet
        run: dotnet build --configuration Release

      - name: dotnet publish
        run: dotnet publish -c Release -o ./artifacts/myapp

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: myapp
          path: ./artifacts/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore EscolaDeCursos.WebApp/EscolaDeCursos.WebApp.csproj

      - name: Install Entity Framework CLI
        run: dotnet tool install --global dotnet-ef

      - name: Apply ORM migrations to Azure SQL
        shell: pwsh
        env:
          AZURE_SQL_CONNECTION_STRING: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
          Infra__NewRelic__LicenseKey: ${{ secrets.NEWRELIC_LICENSE_KEY }}
        run: |
          dotnet ef database update `
            --project EscolaDeCursos.WebApp/EscolaDeCursos.WebApp.csproj `
            --startup-project EscolaDeCursos.WebApp/EscolaDeCursos.WebApp.csproj `
            --configuration Release `
            --connection "$env:AZURE_SQL_CONNECTION_STRING"

      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: myapp
          path: ./artifacts/myapp

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_3E2B801C6CF140CEA31F7092AEF6516A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_129133875AD944E4BECF16BBB162BA84 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_89D3BBBA2CE744509E4B95AF9335EB5B }}

      - name: Configure Azure Web App settings
        shell: pwsh
        run: |
          az webapp config appsettings set `
            --resource-group "escola-de-cursos" `
            --name "escola-de-cursos" `
            --settings `
              "ASPNETCORE_ENVIRONMENT=Production" `
              "ConnectionStrings__SqlServerEF=${{ secrets.AZURE_SQL_CONNECTION_STRING }}" `
              "Infra__NewRelic__LicenseKey=${{ secrets.NEWRELIC_LICENSE_KEY }}" `
              "Apresentacao__AutoMapper__LicenseKey=${{ secrets.AUTOMAPPER_LICENSE_KEY }}"

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'escola-de-cursos'
          slot-name: 'Production'
          package: ./artifacts/myapp